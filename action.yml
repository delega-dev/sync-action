name: Delega Sync
description: Sync repo-local .delega/tasks.jsonl changes to Delega from GitHub Actions.
author: Delega

inputs:
  api-key:
    description: Delega agent API key. Store as a GitHub Actions secret.
    required: true
  api-url:
    description: Delega API base URL.
    required: false
    default: https://api.delega.dev
  command:
    description: Sync command to run: pull, push, or status.
    required: false
    default: push
  working-directory:
    description: Repository subdirectory containing .delega/config.json.
    required: false
    default: .
  cli-version:
    description: Version of @delega-dev/cli to run.
    required: false
    default: 1.5.1
  no-auto-link:
    description: Set to true to disable branch/HEAD auto-linking on sync push.
    required: false
    default: "false"
  json:
    description: Set to true to pass --json to the CLI.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Run delega sync
      shell: bash
      env:
        DELEGA_API_KEY: ${{ inputs.api-key }}
        DELEGA_API_URL: ${{ inputs.api-url }}
        DELEGA_SYNC_COMMAND: ${{ inputs.command }}
        DELEGA_SYNC_WORKDIR: ${{ inputs.working-directory }}
        DELEGA_CLI_VERSION: ${{ inputs.cli-version }}
        DELEGA_NO_AUTO_LINK: ${{ inputs.no-auto-link }}
        DELEGA_OUTPUT_JSON: ${{ inputs.json }}
      run: |
        set -euo pipefail

        case "$DELEGA_SYNC_COMMAND" in
          pull|push|status) ;;
          *)
            echo "::error::command must be one of: pull, push, status"
            exit 2
            ;;
        esac

        cd "$DELEGA_SYNC_WORKDIR"

        args=("sync" "$DELEGA_SYNC_COMMAND")
        if [[ "$DELEGA_SYNC_COMMAND" == "push" && "$DELEGA_NO_AUTO_LINK" == "true" ]]; then
          args+=("--no-auto-link")
        fi
        if [[ "$DELEGA_OUTPUT_JSON" == "true" ]]; then
          args+=("--json")
        fi

        npx --yes "@delega-dev/cli@${DELEGA_CLI_VERSION}" "${args[@]}"

branding:
  icon: git-branch
  color: blue
